<!DOCTYPE html>
<html>

<head>

<title>BloodCare Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    background: linear-gradient(135deg,#fff0f3,#ffe5eb);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}


.login-card{

    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.15);

}


.logo{

    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#e90035;

}


.subtitle{

    text-align:center;
    color:#777;
    margin-top:5px;

}


.form-control{

    height:45px;
    border-radius:10px;

}


.btn-danger{

    background:#e90035;
    border:none;
    height:45px;
    border-radius:10px;
    font-weight:bold;

}


.btn-danger:hover{

    background:#c7002d;

}


.admin-icon{

    text-align:center;
    font-size:55px;

}


</style>


</head>


<body>


<div class="login-card">


<div class="admin-icon">
🩸
</div>


<div class="logo">
BloodCare
</div>


<div class="subtitle">
Admin Panel Login
</div>



<form method="POST" action="/admin_login">


<input
type="text"
name="username"
class="form-control mt-4"
placeholder="Enter Username"
required>



<input
type="password"
name="password"
class="form-control mt-3"
placeholder="Enter Password"
required>



<button 
type="submit"
class="btn btn-danger w-100 mt-4">

Login

</button>



</form>



{% if error %}

<div class="alert alert-danger text-center mt-3">

{{ error }}

</div>

{% endif %}



<div class="text-center mt-4 text-muted">

BloodCare Emergency Donor System

</div>


</div>


</body>

</html>
