<!DOCTYPE html>
<html>

<head>

<title>BloodCare Donor Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{

    background:linear-gradient(135deg,#fff0f3,#ffe3e8);
    min-height:100vh;

}


.register-card{

    width:450px;
    margin:50px auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0px 8px 25px rgba(0,0,0,0.15);

}


.logo{

    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#e90035;

}


.subtitle{

    text-align:center;
    color:#777;

}


.form-control,
.form-select{

    height:45px;
    border-radius:10px;

}


textarea.form-control{

    height:80px;

}


.btn-danger{

    background:#e90035;
    border:none;
    height:45px;
    border-radius:10px;
    font-weight:bold;

}


.btn-danger:hover{

    background:#c9002e;

}


</style>


</head>



<body>



<div class="register-card">



<div class="logo">

🩸 BloodCare

</div>


<h3 class="text-center mt-3">

Donor Registration

</h3>


<p class="subtitle">

Become a life saver

</p>




<form method="POST" action="/register">



<!-- 1 Name -->

<input

type="text"

name="name"

class="form-control mt-3"

placeholder="Enter Full Name"

required>



<!-- 2 Mobile Number -->


<input

type="tel"

name="phone"

class="form-control mt-3"

placeholder="Enter Mobile Number"

pattern="[0-9]{10}"

required>





<!-- 3 Address -->


<textarea

name="address"

class="form-control mt-3"

placeholder="Enter Full Address"

required></textarea>





<!-- 4 Blood Group -->


<select

name="blood_group"

class="form-select mt-3"

required>


<option value="">

Select Blood Group

</option>


<option>A+</option>

<option>A-</option>

<option>B+</option>

<option>B-</option>

<option>AB+</option>

<option>AB-</option>

<option>O+</option>

<option>O-</option>


</select>





<!-- 5 Gender -->


<select

name="gender"

class="form-select mt-3"

required>


<option value="">

Select Gender

</option>


<option>Male</option>

<option>Female</option>

<option>Other</option>


</select>





<!-- 6 Password -->


<input

type="password"

name="password"

class="form-control mt-3"

placeholder="Create Password"

required>





<button

type="submit"

class="btn btn-danger w-100 mt-4">


Register as Donor


</button>




</form>




<div class="text-center mt-3">


Already registered?

<a href="/login" class="text-danger">

Login

</a>


</div>



</div>



</body>


</html>
